<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>분석 히스토리 — Battery Intel</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root{
  --bg:#0a0a0f;--bg2:#111118;--bg3:#18181f;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --accent:#7c6cfa;--accent2:#a78bfa;--teal:#2dd4bf;--amber:#fbbf24;
  --text:#f0f0f5;--text2:#9898a8;--text3:#5a5a6e;
  --mono:'Pretendard',-apple-system,sans-serif;
  --sans:'Pretendard',-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;line-height:1.6;letter-spacing:-0.007em}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0}

/* topbar */
.topbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:52px;background:rgba(10,10,15,0.85);backdrop-filter:blur(12px);border-bottom:0.5px solid var(--border)}
.back-btn{font-size:12px;color:var(--text2);text-decoration:none;font-family:var(--mono);transition:color .15s}
.back-btn:hover{color:var(--teal)}
.topbar-title{font-size:13px;color:var(--text2);font-family:var(--mono)}
.api-indicator{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2);font-family:var(--mono)}
.api-dot{width:6px;height:6px;border-radius:50%;background:var(--text3)}
.api-dot.ok{background:var(--teal)}
.api-btn{padding:3px 10px;border-radius:5px;border:0.5px solid var(--border2);background:transparent;color:var(--text3);font-size:10px;cursor:pointer;transition:all .15s}
.api-btn:hover{border-color:var(--accent);color:var(--accent2)}

/* main */
.main{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:2.5rem 2rem 4rem}
.page-title{font-size:22px;font-weight:600;margin-bottom:6px;letter-spacing:-.02em}
.page-sub{font-size:13px;color:var(--text2);margin-bottom:2rem}

/* 상태 메시지 */
.status-box{background:var(--bg2);border:0.5px solid var(--border);border-radius:12px;padding:3rem 2rem;text-align:center}
.status-box .ico{font-size:32px;margin-bottom:12px}
.status-box p{font-size:13px;color:var(--text2);line-height:1.7}
.status-box a{color:var(--teal);text-decoration:none}

/* 히스토리 카드 */
.history-list{display:flex;flex-direction:column;gap:12px}
.hist-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:12px;padding:1.25rem 1.5rem;cursor:pointer;transition:border-color .2s}
.hist-card:hover{border-color:var(--border2)}
.hist-card.open{border-color:rgba(45,212,191,0.3)}
.hist-header{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem}
.hist-meta{display:flex;flex-direction:column;gap:4px;flex:1}
.hist-fname{font-size:14px;font-weight:600;color:var(--text)}
.hist-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.hist-tag{font-size:10px;font-family:var(--mono);color:var(--text3);border:0.5px solid var(--border);padding:2px 7px;border-radius:4px}
.hist-tag.type{color:var(--teal);border-color:rgba(45,212,191,0.2);background:rgba(45,212,191,0.05)}
.hist-date{font-size:11px;color:var(--text3);font-family:var(--mono);white-space:nowrap}
.hist-summary{font-size:12px;color:var(--text2);margin-top:8px;line-height:1.6}

/* 펼치기 화살표 */
.hist-arrow{font-size:14px;color:var(--text3);transition:transform .2s;flex-shrink:0;margin-top:2px}
.hist-card.open .hist-arrow{transform:rotate(180deg)}

/* 상세 내용 */
.hist-detail{display:none;margin-top:1.2rem;padding-top:1.2rem;border-top:0.5px solid var(--border)}
.hist-card.open .hist-detail{display:block}

.detail-section{margin-bottom:1rem}
.detail-label{font-size:10px;font-family:var(--mono);color:var(--text3);letter-spacing:.08em;margin-bottom:6px}
.insight-row{display:flex;gap:8px;margin-bottom:6px;align-items:flex-start}
.insight-num{width:20px;height:20px;border-radius:4px;background:var(--teal);color:white;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.insight-num.normal{background:rgba(255,255,255,0.1)}
.insight-content{}
.insight-title{font-size:12px;font-weight:600;color:var(--text)}
.insight-body{font-size:11px;color:var(--text2);margin-top:2px;line-height:1.6}

.num-chips{display:flex;flex-wrap:wrap;gap:6px}
.num-chip{background:var(--bg3);border:0.5px solid var(--border);border-radius:6px;padding:4px 10px;font-size:11px}
.num-chip span{color:var(--teal);font-weight:600;margin-left:4px}

.action-rows{display:flex;flex-direction:column;gap:4px}
.action-row{font-size:12px;color:var(--text2);display:flex;gap:8px;align-items:flex-start}
.action-check{color:var(--teal);flex-shrink:0}

.risk-chips{display:flex;flex-direction:column;gap:4px}
.risk-chip{display:flex;gap:8px;align-items:flex-start;font-size:12px;color:var(--text2)}
.risk-pill{font-size:10px;font-weight:600;padding:1px 6px;border-radius:3px;flex-shrink:0;margin-top:1px}
.risk-pill.high{background:rgba(192,57,43,0.15);color:#f87171}
.risk-pill.medium{background:rgba(232,160,0,0.15);color:var(--amber)}
.risk-pill.low{background:rgba(5,150,105,0.15);color:#34d399}

/* 다운로드 버튼 */
.dl-btns{display:flex;gap:8px;margin-top:1rem}
.dl-btn{padding:6px 14px;border-radius:6px;border:0.5px solid var(--border2);background:transparent;color:var(--text2);font-size:11px;font-family:var(--mono);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px}
.dl-btn:hover{border-color:var(--teal);color:var(--teal)}
.dl-btn.pdf:hover{border-color:var(--accent2);color:var(--accent2)}

/* 모달 */
.modal-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--bg2);border:0.5px solid var(--border2);border-radius:16px;padding:2rem;width:min(420px,90vw)}
.modal-title{font-size:16px;font-weight:600;margin-bottom:6px}
.modal-sub{font-size:12px;color:var(--text2);margin-bottom:1.5rem;line-height:1.6}
.modal input{width:100%;background:var(--bg3);border:0.5px solid var(--border2);border-radius:8px;padding:10px 14px;font-size:13px;font-family:var(--mono);color:var(--text);margin-bottom:12px;outline:none}
.modal input:focus{border-color:var(--accent)}
.modal-btns{display:flex;gap:8px}
.btn-primary{flex:1;padding:10px;background:var(--accent);color:white;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;transition:opacity .15s}
.btn-primary:hover{opacity:.85}
.btn-secondary{padding:10px 16px;background:transparent;border:0.5px solid var(--border2);border-radius:8px;color:var(--text2);font-size:13px;cursor:pointer}
.modal-link{display:block;text-align:center;font-size:11px;color:var(--text3);margin-top:12px;text-decoration:none}
.modal-link:hover{color:var(--accent2)}

/* 삭제 버튼 */
.del-btn{padding:3px 8px;border-radius:4px;border:0.5px solid rgba(248,113,113,0.2);background:transparent;color:rgba(248,113,113,0.5);font-size:10px;cursor:pointer;transition:all .15s}
.del-btn:hover{border-color:#f87171;color:#f87171}
</style>
</head>
<body>

<nav class="topbar">
  <a href="index.html" class="back-btn">← 포털로</a>
  <span class="topbar-title">분석 히스토리</span>
  <div class="api-indicator">
    <div class="api-dot" id="gistDot"></div>
    <span id="gistTxt">Gist 미설정</span>
    <button class="api-btn" onclick="openGistModal()">Gist 설정</button>
  </div>
</nav>

<main class="main">
  <h1 class="page-title">분석 히스토리</h1>
  <p class="page-sub">GitHub Gist에 저장된 PDF 분석 기록</p>
  <div id="historyList"></div>
</main>

<!-- Gist Token Modal -->
<div class="modal-overlay" id="gistModalOverlay">
  <div class="modal">
    <div class="modal-title">GitHub Gist 토큰 설정</div>
    <div class="modal-sub">분석 히스토리를 불러오려면 Gist 권한이 있는 Classic Token이 필요합니다. 토큰은 이 브라우저에만 저장됩니다.</div>
    <input type="password" id="gistTokenInput" placeholder="ghp_..." />
    <div class="modal-btns">
      <button class="btn-secondary" onclick="closeGistModal()">취소</button>
      <button class="btn-primary" onclick="saveGistToken()">저장 후 불러오기</button>
    </div>
    <a href="https://github.com/settings/tokens" target="_blank" class="modal-link">토큰 발급받기 → github.com/settings/tokens (classic, gist 권한)</a>
  </div>
</div>

<script>
// ── Gist 토큰 관리 ───────────────────────────────────────────────────────────
function checkGist(){
  const t=localStorage.getItem('github_gist_token');
  const dot=document.getElementById('gistDot'),txt=document.getElementById('gistTxt');
  if(t&&t.startsWith('ghp_')){dot.classList.add('ok');txt.textContent='Gist 연결됨';}
  else{dot.classList.remove('ok');txt.textContent='Gist 미설정';}
}
function openGistModal(){
  const t=localStorage.getItem('github_gist_token');
  if(t)document.getElementById('gistTokenInput').value=t;
  document.getElementById('gistModalOverlay').classList.add('show');
}
function closeGistModal(){document.getElementById('gistModalOverlay').classList.remove('show');}
function saveGistToken(){
  const val=document.getElementById('gistTokenInput').value.trim();
  if(!val){alert('토큰을 입력해주세요.');return;}
  localStorage.setItem('github_gist_token',val);
  closeGistModal();checkGist();
  loadHistory();
}
document.getElementById('gistModalOverlay').addEventListener('click',function(e){if(e.target===this)closeGistModal();});

// ── 히스토리 로드 ────────────────────────────────────────────────────────────
async function loadHistory(){
  const token=localStorage.getItem('github_gist_token');
  const el=document.getElementById('historyList');

  if(!token){
    el.innerHTML=`<div class="status-box"><div class="ico">🔑</div><p>GitHub Gist 토큰을 설정하면<br>어느 기기에서든 분석 히스토리를 확인할 수 있어요.<br><br><button class="api-btn" onclick="openGistModal()" style="font-size:12px;padding:6px 14px">Gist 토큰 설정하기</button></p></div>`;
    return;
  }

  el.innerHTML=`<div class="status-box"><div class="ico">⟳</div><p>히스토리 불러오는 중...</p></div>`;

  try{
    const listRes=await fetch('https://api.github.com/gists',{
      headers:{'Authorization':`token ${token}`,'Accept':'application/vnd.github.v3+json'}
    });
    const gists=await listRes.json();
    const existing=gists.find(g=>g.description==='battery-intel-history');

    if(!existing){
      el.innerHTML=`<div class="status-box"><div class="ico">📭</div><p>아직 저장된 히스토리가 없어요.<br><a href="summarizer.html">PDF 보고서 요약기</a>에서 분석을 실행하면 자동으로 저장됩니다.</p></div>`;
      return;
    }

    const detailRes=await fetch(`https://api.github.com/gists/${existing.id}`,{
      headers:{'Authorization':`token ${token}`,'Accept':'application/vnd.github.v3+json'}
    });
    const detail=await detailRes.json();
    const history=JSON.parse(detail.files['history.json'].content||'[]');

    if(!history.length){
      el.innerHTML=`<div class="status-box"><div class="ico">📭</div><p>저장된 히스토리가 없어요.</p></div>`;
      return;
    }

    renderHistory(history, existing.id, token);
  }catch(e){
    el.innerHTML=`<div class="status-box"><div class="ico">⚠️</div><p>히스토리를 불러오지 못했어요.<br>토큰이 유효한지 확인해주세요.<br><button class="api-btn" onclick="openGistModal()" style="font-size:12px;padding:6px 14px;margin-top:8px">토큰 재설정</button></p></div>`;
  }
}

// ── 히스토리 렌더링 ──────────────────────────────────────────────────────────
function renderHistory(history, gistId, token){
  const el=document.getElementById('historyList');
  el.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><span style="font-size:12px;color:var(--text3);font-family:var(--mono)">${history.length}개 항목</span><button class="api-btn" onclick="loadHistory()" style="font-size:11px">↻ 새로고침</button></div><div class="history-list" id="cards"></div>`;

  const cards=document.getElementById('cards');
  history.forEach((entry,idx)=>{
    const r=entry.result||{};
    const date=new Date(entry.date).toLocaleDateString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
    const card=document.createElement('div');
    card.className='hist-card';
    card.innerHTML=`
      <div class="hist-header">
        <div class="hist-meta">
          <div class="hist-fname">📄 ${entry.fname||'알 수 없는 파일'}</div>
          <div class="hist-tags">
            <span class="hist-tag type">${entry.docType||'보고서'}</span>
            ${r.numbers?.length?`<span class="hist-tag">수치 ${r.numbers.length}개</span>`:''}
            ${r.key_insights?.length?`<span class="hist-tag">인사이트 ${r.key_insights.length}개</span>`:''}
            ${r.action_items?.length?`<span class="hist-tag">액션 ${r.action_items.length}개</span>`:''}
          </div>
          ${r.doc_summary?`<div class="hist-summary">${r.doc_summary}</div>`:''}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
          <span class="hist-date">${date}</span>
          <button class="del-btn" onclick="deleteEntry(event,${idx},'${gistId}','${token}')">삭제</button>
        </div>
        <span class="hist-arrow">▾</span>
      </div>
      <div class="hist-detail">
        ${r.numbers?.length?`
        <div class="detail-section">
          <div class="detail-label">핵심 수치</div>
          <div class="num-chips">${r.numbers.map(n=>`<div class="num-chip">${n.label}<span>${n.value}</span></div>`).join('')}</div>
        </div>`:''}
        ${r.key_insights?.length?`
        <div class="detail-section">
          <div class="detail-label">핵심 인사이트</div>
          ${r.key_insights.map((ins,i)=>`
          <div class="insight-row">
            <div class="insight-num${ins.importance!=='high'?' normal':''}">${i+1}</div>
            <div class="insight-content">
              <div class="insight-title">${ins.title}</div>
              <div class="insight-body">${ins.body}</div>
            </div>
          </div>`).join('')}
        </div>`:''}
        ${r.action_items?.length?`
        <div class="detail-section">
          <div class="detail-label">액션 아이템</div>
          <div class="action-rows">${r.action_items.map(a=>`<div class="action-row"><span class="action-check">✓</span><span>${a}</span></div>`).join('')}</div>
        </div>`:''}
        ${r.risks?.length?`
        <div class="detail-section">
          <div class="detail-label">리스크 요인</div>
          <div class="risk-chips">${r.risks.map(rk=>`<div class="risk-chip"><span class="risk-pill ${rk.level||'medium'}">${{high:'높음',medium:'중간',low:'낮음'}[rk.level]||rk.level}</span><span>${rk.text}</span></div>`).join('')}</div>
        </div>`:''}
        <div class="dl-btns">
          <button class="dl-btn pdf" onclick="downloadPDF_hist(${idx})">↓ PDF 보고서</button>
          <button class="dl-btn" onclick="downloadPPT_hist(${idx})">↓ PPT 다운로드</button>
        </div>
      </div>`;

    card.querySelector('.hist-header').addEventListener('click',function(e){
      if(e.target.classList.contains('del-btn'))return;
      card.classList.toggle('open');
    });
    cards.appendChild(card);
  });

  // 전역에 히스토리 저장 (다운로드용)
  window._historyData=history;
}

// ── 항목 삭제 ────────────────────────────────────────────────────────────────
async function deleteEntry(e, idx, gistId, token){
  e.stopPropagation();
  if(!confirm('이 항목을 삭제할까요?'))return;
  try{
    const detailRes=await fetch(`https://api.github.com/gists/${gistId}`,{
      headers:{'Authorization':`token ${token}`,'Accept':'application/vnd.github.v3+json'}
    });
    const detail=await detailRes.json();
    const history=JSON.parse(detail.files['history.json'].content||'[]');
    history.splice(idx,1);
    await fetch(`https://api.github.com/gists/${gistId}`,{
      method:'PATCH',
      headers:{'Authorization':`token ${token}`,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'},
      body:JSON.stringify({files:{'history.json':{content:JSON.stringify(history,null,2)}}})
    });
    loadHistory();
  }catch(e){alert('삭제에 실패했어요.');}
}

// ── PDF 다운로드 ─────────────────────────────────────────────────────────────
function downloadPDF_hist(idx){
  const entry=window._historyData[idx];
  if(!entry)return;
  const r=entry.result;
  const date=new Date(entry.date).toLocaleDateString('ko-KR');
  let html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
    body{font-family:'맑은 고딕',Arial,sans-serif;color:#1a1a2e;background:white;padding:40px;max-width:800px;margin:0 auto;font-size:13px;line-height:1.6}
    h1{font-size:20px;color:#1B2A4A;margin-bottom:8px}
    .meta{font-size:11px;color:#666;margin-bottom:24px;border-bottom:1px solid #eee;padding-bottom:12px}
    .sec{font-size:11px;font-weight:700;color:#1B8A7A;letter-spacing:.06em;margin:20px 0 8px;text-transform:uppercase}
    .num-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px}
    .num-card{border:1px solid #e9ecef;border-radius:6px;padding:10px;text-align:center}
    .num-label{font-size:10px;color:#666;margin-bottom:4px}
    .num-val{font-size:15px;font-weight:700;color:#1B8A7A}
    .insight{border-left:3px solid #1B8A7A;padding:8px 12px;margin-bottom:8px;background:#f8f9fa;border-radius:0 6px 6px 0}
    .insight.high{border-color:#1B8A7A;background:#E8F5F3}
    .ins-title{font-weight:700;font-size:13px;margin-bottom:3px}
    .ins-body{font-size:11px;color:#495057}
    .action{display:flex;gap:8px;margin-bottom:4px;font-size:12px}
    .check{color:#1B8A7A;font-weight:700}
    .risk{display:flex;gap:8px;margin-bottom:4px;align-items:flex-start;font-size:12px}
    .pill{font-size:10px;font-weight:700;padding:1px 6px;border-radius:3px;white-space:nowrap}
    .pill.high{background:#fde8e8;color:#c0392b}
    .pill.medium{background:#fef3cd;color:#e8a000}
    .pill.low{background:#d1fae5;color:#059669}
    .footer{margin-top:32px;padding-top:12px;border-top:1px solid #eee;font-size:10px;color:#adb5bd;text-align:center}
  </style></head><body>
  <h1>${r.doc_summary||entry.fname}</h1>
  <div class="meta">원문: ${entry.fname}.pdf | 유형: ${entry.docType} | 분석일: ${date} | Battery Intel</div>`;
  if(r.numbers?.length){html+=`<div class="sec">핵심 수치</div><div class="num-grid">`;r.numbers.forEach(n=>html+=`<div class="num-card"><div class="num-label">${n.label}</div><div class="num-val">${n.value}</div></div>`);html+=`</div>`;}
  if(r.key_insights?.length){html+=`<div class="sec">핵심 인사이트</div>`;r.key_insights.forEach(ins=>html+=`<div class="insight ${ins.importance==='high'?'high':''}"><div class="ins-title">${ins.title}</div><div class="ins-body">${ins.body}</div></div>`);}

  html+=`<div class="footer">Battery Intel | Powered by Claude API | 내부 배포용</div></body></html>`;
  const w=window.open('','_blank');w.document.write(html);w.document.close();setTimeout(()=>w.print(),600);
}

  s1.addShape('line',{x:cx,y:3.05,w:cw,h:0,line:{color:C.gray200,width:0.5}});
  [['분석 일자',date],['문서 유형',docType]].forEach(([lb,val],i)=>{

  ftr(s2,2,TOTAL);

  if(allIns.length){const rowH=(H-SY-0.38)/allIns.length-0.07;allIns.forEach((ins,i)=>{const ry=SY+i*(rowH+0.07);const hi=ins.importance==='high';s3.addShape('rect',{x:mx,y:ry,w:0.42,h:rowH,fill:{color:hi?C.teal:C.navy},line:{color:hi?C.teal:C.navy}});s3.addText(`${i+1}`,{x:mx,y:ry,w:0.42,h:rowH,...tx(SZ.head,true,C.white,true),align:'center',valign:'middle',margin:0});s3.addShape('rect',{x:mx+0.42,y:ry,w:mw-0.42,h:rowH,fill:{color:hi?'F0FAF8':C.gray50},line:{color:hi?C.teal:C.gray200,width:0.5}});if(hi){s3.addShape('rect',{x:W-0.75,y:ry+0.08,w:0.52,h:0.22,fill:{color:C.tealLt},line:{color:C.teal,width:0.5}});s3.addText('핵심',{x:W-0.75,y:ry+0.08,w:0.52,h:0.22,...tx(SZ.detail,false,C.teal),align:'center',valign:'middle',margin:0});}s3.addText(ins.title,{x:mx+0.55,y:ry+0.07,w:mw-1.2,h:0.3,...tx(SZ.body,true,C.gray900),valign:'middle',margin:0});s3.addText(trunc(ins.body,120),{x:mx+0.55,y:ry+0.37,w:mw-0.7,h:rowH-0.44,...tx(SZ.detail,false,C.gray700),valign:'top',margin:0,wrap:true});});}

  const nums4=(r.numbers||[]).slice(0,4);const rowH4=(contentH-0.36)/Math.max(nums4.length,1);

  // Slide 5
  const s5=pptx.addSlide();s5.background={color:C.white};hdr(s5,'04· 액션아이템','시사점 및 액션 아이템');

  // XML 패치 (커닝 + 윤곽선 투명도)
  pptx.write('arraybuffer').then(async function(buf){
    const zip=await JSZip.loadAsync(buf);
    const slideFiles=Object.keys(zip.files).filter(f=>/ppt\/slides\/slide\d+\.xml$/.test(f));
    for(const sf of slideFiles){
      let xml=await zip.file(sf).async('string');
      xml=xml.replace(/<a:rPr([^>]*?)>/g,(m,attrs)=>{
        if(/kern=/.test(attrs))return m.replace(/kern="\d+"/,'kern="1200"');
        return `<a:rPr${attrs} kern="1200">`;
      });
      xml=xml.replace(/(<a:ln\s+w="3175"[^>]*>)([\s\S]*?)(<\/a:ln>)/g,(m,open,inner,close)=>{
        if(/a:alpha/.test(inner))return m;
        inner=inner.replace(/(<a:srgbClr\s+val="([A-Fa-f0-9]{6})")\s*\/>/g,'$1><a:alpha val="10000"/></a:srgbClr>');
        return open+inner+close;
      });
      zip.file(sf,xml);
    }
    const blob=await zip.generateAsync({type:'blob',mimeType:'application/vnd.openxmlformats-officedocument.presentationml.presentation'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;
    a.download=`BatteryIntel_${fname}_${date.replace(/\.\s*/g,'')}.pptx`;
    document.body.appendChild(a);a.click();
    setTimeout(()=>{URL.revokeObjectURL(url);document.body.removeChild(a);},1000);
  });
}
